name: Docs

# The docs site is served from the VPS (Caddy file_server over `mkdocs build`),
# not GitHub Pages. This job is a build check: it fails the push/PR if the docs
# stop building cleanly, so a stale `:::` reference or broken nav is caught.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Docs-only env: mkdocstrings reads the sources statically (the `paths` in
      # mkdocs.yml), so the workspace packages need not be installed.
      - run: uv sync --only-group docs
      - run: uv run --no-sync --only-group docs mkdocs build --strict
