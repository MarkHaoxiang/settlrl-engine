name: Docs

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Least privilege for the deploy: read the repo, write the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Docs-only env: mkdocstrings reads the sources statically (the `paths` in
      # mkdocs.yml), so the workspace packages need not be installed.
      - run: uv sync --only-group docs
      - run: uv run --no-sync --only-group docs mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
