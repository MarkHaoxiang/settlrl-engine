name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  JAX_PLATFORMS: cpu
  # The cuda dependency group is default-on for dev machines; runners have no
  # GPU and shouldn't download the NVIDIA wheels.
  UV_NO_GROUP: cuda

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # XLA compilation cache (written by the test conftests); keyed loosely --
      # JAX validates entries itself, stale ones are just misses.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/jax-settlrl
          key: jax-settlrl-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: jax-settlrl-${{ runner.os }}-
      - run: uv sync --locked
      - run: uv run ruff check packages
      - run: uv run ruff format --check packages
      - run: >
          uv run mypy
          packages/settlrl-engine/src packages/settlrl-engine/tests
          packages/settlrl-agents/src packages/settlrl-agents/tests
          packages/settlrl-render/src packages/settlrl-reference/src
          packages/settlrl-learn/src packages/settlrl-learn/tests
      - run: bash mypy_experiments.sh
      - run: uv run --package settlrl-engine pytest packages/settlrl-engine/tests
      - run: uv run --package settlrl-reference pytest packages/settlrl-reference
      - run: uv run --package settlrl-render pytest packages/settlrl-render
      - run: uv run --package settlrl-agents pytest packages/settlrl-agents/tests
      - run: uv run --package settlrl-learn pytest packages/settlrl-learn/tests
      # Experiment smoke tests (full, including `slow`): exercise every
      # framework's plumbing end-to-end at trivial budgets. `-n auto` runs the
      # frameworks' smokes in parallel (each is JIT-compile-bound and otherwise
      # serial); the wall clock is then the slowest one, not their sum.
      - run: WANDB_MODE=disabled uv run pytest experiments/tests -n auto
