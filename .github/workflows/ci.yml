name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  JAX_PLATFORMS: cpu

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # XLA compilation cache (written by the test conftests); keyed loosely --
      # JAX validates entries itself, stale ones are just misses.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/jax-catan
          key: jax-catan-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: jax-catan-${{ runner.os }}-
      - run: uv sync --locked
      - run: uv run ruff check packages
      - run: uv run ruff format --check packages
      - run: >
          uv run mypy
          packages/catan-engine/src packages/catan-engine/tests
          packages/catan-agents/src packages/catan-agents/tests
          packages/catan-render/src packages/catan-reference/src
      - run: uv run --package catan-engine pytest packages/catan-engine/tests
      - run: uv run --package catan-reference pytest packages/catan-reference
      - run: uv run --package catan-render pytest packages/catan-render
      - run: uv run --package catan-agents pytest packages/catan-agents/tests
