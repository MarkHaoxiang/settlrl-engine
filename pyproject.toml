[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "beartype>=0.19",
    # Workspace members in the root env, so `uv run python experiments/...`
    # imports the whole stack without --package indirection.
    "settlrl-agents",
    "settlrl-learn",
    "settlrl-game",
    "expecttest>=0.2.1",
    "gymnasium>=0.29",
    "hypothesis>=6.131.0",
    "mypy>=2.1.0",
    "pettingzoo>=1.24",
    "pre-commit>=4.2.0",
    "pytest>=8.4.0",
    "pytest-benchmark>=5.2.3",
    "pytest-cov>=6.0.0",
    "pytest-xdist>=3.8.0",
    "ruff>=0.15.14",
    "scikit-learn>=1.9.0",
    "tabulate>=0.9.0",
    "types-tabulate>=0.9.0",
    "hydra-core>=1.3.3",
    "pydantic>=2.13.4",
    "optax>=0.2.8",
    "equinox>=0.13.8",
    "wandb>=0.27.2",
    "jraph>=0.0.6.dev0",
    "flashbax>=0.1.0",
    "tqdm>=4.67",
    "types-tqdm>=4.67",
]
# GPU support can't be marker-detected (markers see the OS, not the hardware),
# so it's a *default* group on Linux: a plain `uv sync` no longer prunes the
# CUDA jaxlib from dev machines. CI opts out (UV_NO_GROUP=cuda in ci.yml) to
# avoid pulling the NVIDIA wheels on runners; same pin as settlrl-engine's
# user-facing `cuda` extra.
cuda = [
    "jax[cuda13]>=0.7 ; sys_platform == 'linux'",
]
# Documentation site (mkdocs build / serve). Opt-in (not a default group) so a
# plain `uv sync` stays lean: `uv run --group docs mkdocs serve`. mkdocstrings
# reads docstrings + signatures straight from the workspace sources.
docs = [
    "mkdocs>=1.6",
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.27",
    # mkdocstrings formats rendered signatures with ruff when it's available.
    "ruff>=0.15.14",
]

[tool.uv]
default-groups = ["dev", "cuda"]

[tool.uv.sources]
settlrl-agents = { workspace = true }
settlrl-learn = { workspace = true }
settlrl-game = { workspace = true }

[tool.mypy]
mypy_path = [
    "packages/settlrl-agents/src",
    "packages/settlrl-engine/src",
    "packages/settlrl-app/src",
    "packages/settlrl-game/src",
    "packages/settlrl-learn/src",
]
strict = true
disallow_any_explicit = false
disallow_any_generics = false

[[tool.mypy.overrides]]
module = ["jax.*", "jaxlib.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["pettingzoo.*", "gymnasium.*", "sklearn.*", "jraph.*", "optax.*", "wandb.*", "flashbax.*", "orbax.*"]
ignore_missing_imports = true

[tool.ruff.lint]
# Defaults (E4/E7/E9/F) plus: import sorting, bugbear, pyupgrade,
# comprehensions, simplify, and the ruff-specific rules.
extend-select = ["I", "B", "UP", "C4", "SIM", "RUF"]

[tool.ruff.lint.per-file-ignores]
# Experiment scripts bootstrap sys.path before importing experiments/_lib; the
# NN frameworks carry jaxtyping shape strings (same forward-ref trip as src,
# and UP037's autofix would strip the quotes those annotations need).
"experiments/**" = ["E402", "F722", "F821", "UP037"]
# jaxtyping shape strings in annotations ("*batch ...") trip the forward-ref
# rules (and UP037's autofix strips the quotes they need — keep it off
# everywhere under src, or any --fix run corrupts the annotations).
"packages/*/src/**" = ["UP037"]
"packages/settlrl-engine/src/settlrl_engine/board/__init__.py" = ["F722", "F821"]
"packages/settlrl-engine/src/settlrl_engine/board/layout.py" = ["F722", "F821"]
"packages/settlrl-engine/src/settlrl_engine/board/resources.py" = ["F722", "F821"]
"packages/settlrl-engine/src/settlrl_engine/board/state.py" = ["F722", "F821"]
"packages/settlrl-engine/src/settlrl_engine/env/batched.py" = ["F722", "F821"]
"packages/settlrl-engine/src/settlrl_engine/mechanics/flat.py" = ["F722", "F821"]
"packages/settlrl-agents/src/settlrl_agents/search/__init__.py" = ["F722", "F821"]
"packages/settlrl-learn/src/**" = ["F722", "F821"]
"packages/settlrl-agents/src/settlrl_agents/evaluate.py" = ["F722", "F821"]
