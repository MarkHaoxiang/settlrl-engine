[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "beartype>=0.19",
    # Workspace members in the root env, so `uv run python experiments/...`
    # imports the whole stack without --package indirection.
    "catan-agents",
    "catan-learn",
    "catan-reference",
    "expecttest>=0.2.1",
    "gymnasium>=0.29",
    "hypothesis>=6.131.0",
    "mypy>=2.1.0",
    "pettingzoo>=1.24",
    "pre-commit>=4.2.0",
    "pytest>=8.4.0",
    "pytest-benchmark>=5.2.3",
    "pytest-cov>=6.0.0",
    "pytest-xdist>=3.8.0",
    "ruff>=0.15.14",
    "scikit-learn>=1.9.0",
    "tabulate>=0.9.0",
    "types-tabulate>=0.9.0",
]
# GPU support can't be marker-detected (markers see the OS, not the hardware),
# so it's a *default* group on Linux: a plain `uv sync` no longer prunes the
# CUDA jaxlib from dev machines. CI opts out (UV_NO_GROUP=cuda in ci.yml) to
# avoid pulling the NVIDIA wheels on runners; same pin as catan-engine's
# user-facing `cuda` extra.
cuda = [
    "jax[cuda13]>=0.7 ; sys_platform == 'linux'",
]

[tool.uv]
default-groups = ["dev", "cuda"]

[tool.uv.sources]
catan-agents = { workspace = true }
catan-learn = { workspace = true }
catan-reference = { workspace = true }

[tool.mypy]
mypy_path = [
    "packages/catan-agents/src",
    "packages/catan-engine/src",
    "packages/catan-render/src",
    "packages/catan-reference/src",
]
strict = true
disallow_any_explicit = false
disallow_any_generics = false

[[tool.mypy.overrides]]
module = ["jax.*", "jaxlib.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["pettingzoo.*", "gymnasium.*"]
ignore_missing_imports = true

[tool.ruff.lint]
# Defaults (E4/E7/E9/F) plus: import sorting, bugbear, pyupgrade,
# comprehensions, simplify, and the ruff-specific rules.
extend-select = ["I", "B", "UP", "C4", "SIM", "RUF"]

[tool.ruff.lint.per-file-ignores]
# Experiment scripts bootstrap sys.path before importing experiments/_lib.
"experiments/**" = ["E402"]
# jaxtyping shape strings in annotations ("*batch ...") trip the forward-ref
# rules (and UP037's autofix strips the quotes they need — keep it off
# everywhere under src, or any --fix run corrupts the annotations).
"packages/*/src/**" = ["UP037"]
"packages/catan-engine/src/catan_engine/board/__init__.py" = ["F722", "F821"]
"packages/catan-engine/src/catan_engine/board/layout.py" = ["F722", "F821"]
"packages/catan-engine/src/catan_engine/board/resources.py" = ["F722", "F821"]
"packages/catan-engine/src/catan_engine/board/state.py" = ["F722", "F821"]
"packages/catan-engine/src/catan_engine/env/batched.py" = ["F722", "F821"]
"packages/catan-engine/src/catan_engine/mechanics/flat.py" = ["F722", "F821"]
"packages/catan-agents/src/catan_agents/search/mcts.py" = ["F722", "F821"]
"packages/catan-agents/src/catan_agents/search/smcts.py" = ["F722", "F821"]
"packages/catan-learn/src/**" = ["F722", "F821"]
"packages/catan-agents/src/catan_agents/evaluate.py" = ["F722", "F821"]
