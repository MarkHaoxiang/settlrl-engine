# @package _global_
# ~10h scale run: no chance nodes / no expected-EV leaf (single sampled roll),
# batch at the measured throughput sweet spot (256), Canopy q-blend + lr.
defaults:
  - override /net: gnn
  - override /teacher: heuristic
net:
  width: 96
  layers: 4
n_iterations: 240
checkpoint_every: 10
selfplay:
  samples: 16384
  batch: 256
search:
  num_simulations: 64
  max_considered: 16
  expected_rolls: false   # no expected EV (single sampled roll)
  chance_nodes: false     # no chance nodes
optim:
  batch_size: 1024
  reuse: 2.0
  lr: 5.0e-4
replay:
  buffer_max: 200000
value_blend:
  max: 0.85   # Canopy q-blend
  ramp: 60    # Canopy ramp
arena:
  games: 40
  every: 5
  batch: 128
  sims: 24
