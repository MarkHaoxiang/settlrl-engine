# @package _global_
# Warm-started: the first teacher.iters iters learn from a fixed strong
# heuristic search (the cold-start fix), then self-play takes over.
defaults:
  - override /net: gnn
  - override /teacher: heuristic
net:
  width: 96
  layers: 4
n_iterations: 30
checkpoint_every: 2
selfplay:
  samples: 4096
  batch: 256
search:
  num_simulations: 32
  max_considered: 16
optim:
  batch_size: 512
  reuse: 2.0
arena:
  games: 40
  every: 4
  batch: 64
  sims: 24
