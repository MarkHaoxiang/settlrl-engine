[project]
name = "catan-render"
version = "0.1.0"
description = "Catan rendering library"
authors = [
    { name = "MarkHaoxiang", email = "mark.haoxiang@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    # [rl] pulls in pettingzoo/gymnasium, needed by the AEC env that drives /play.
    "catan-engine[rl]",
    # Bot policies for the non-human seats.
    "catan-agents",
    "fastapi[standard]>=0.115.0",
]

[project.scripts]
catan-render = "catan_render:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
catan-engine = { workspace = true }
catan-agents = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-n auto"

# Empty: makes the workspace-wide CI opt-out (UV_NO_GROUP=cuda in ci.yml) a
# valid group name under `uv run --package <this>`. The real cuda group lives
# in the workspace root's pyproject.
[dependency-groups]
cuda = []
