[project]
name = "catan-engine"
version = "0.1.0"
description = "Catan game engine"
readme = "README.md"
authors = [
    { name = "MarkHaoxiang", email = "mark.haoxiang@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "jax[cpu]>=0.4.0",
    "jaxtyping>=0.3.10",
]

[project.optional-dependencies]
# The PettingZoo-AEC wrapper (catan_engine.aec) needs these; the core engine and
# the batched env (catan_engine.env) do not.
rl = [
    "gymnasium>=0.29",
    "pettingzoo>=1.24",
]

[project.scripts]
catan-engine = "catan_engine:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
# Deselect the throughput benchmarks by default (they dominate wall-clock and
# aren't correctness tests). Run them with `-m benchmark` or via the
# repo-root run_benchmarks.sh wrapper.
addopts = "--cov=catan_engine --cov-report=term-missing -m 'not benchmark'"
markers = [
    "benchmark: throughput benchmark, deselected by default (run with -m benchmark)",
]

[tool.coverage.run]
source = ["catan_engine"]
branch = true

[tool.coverage.report]
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "\\.\\.\\.",
]

[tool.mypy]
strict = true
disallow_any_explicit = false
disallow_any_generics = false
