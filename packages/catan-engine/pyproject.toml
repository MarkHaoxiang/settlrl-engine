[project]
name = "catan-engine"
version = "0.1.0"
description = "Catan game engine"
readme = "README.md"
authors = [
    { name = "MarkHaoxiang", email = "mark.haoxiang@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "jax[cpu]>=0.4.0",
    "jaxtyping>=0.3.10",
]

[project.scripts]
catan-engine = "catan_engine:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=catan_engine --cov-report=term-missing"

[tool.coverage.run]
source = ["catan_engine"]
branch = true

[tool.coverage.report]
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "\\.\\.\\.",
]

[tool.mypy]
strict = true
disallow_any_explicit = false
disallow_any_generics = false
