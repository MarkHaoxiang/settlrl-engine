[project]
name = "settlrl-game"
version = "0.1.0"
description = "The Settlrl game model: the plain-Python reference rules (settlrl_game.reference) plus the serialization/replay layer the app and bot service share."
readme = "README.md"
authors = [
    { name = "MarkHaoxiang", email = "mark.haoxiang@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    # The serialization/replay layer (models, convert, actions, session) is
    # built on pydantic; the reference rules themselves stay dependency-free.
    "pydantic>=2.11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.mypy]
strict = true

# Empty: makes the workspace-wide CI opt-out (UV_NO_GROUP=cuda in ci.yml) a
# valid group name under `uv run --package <this>`. The real cuda group lives
# in the workspace root's pyproject.
[dependency-groups]
cuda = []
