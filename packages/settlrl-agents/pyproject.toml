[project]
name = "settlrl-agents"
version = "0.1.0"
description = "Settlrl-playing agents (pure-JAX policies) for settlrl-engine"
readme = "README.md"
authors = [
    { name = "MarkHaoxiang", email = "mark.haoxiang@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "settlrl-engine",
    "jax[cpu]>=0.4.0",
    "jaxtyping>=0.3.10",
]

# The bot service (settlrl_agents.service): a FastAPI app serving moves over the
# shared bot wire protocol. Kept an extra so the base policies stay web-free.
[project.optional-dependencies]
service = [
    "settlrl-game",
    "fastapi[standard]>=0.115.0",
]

[project.scripts]
settlrl-agents = "settlrl_agents.cli:main"
settlrl-bot-service = "settlrl_agents.service.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
settlrl-engine = { workspace = true }
settlrl-game = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
# Deselect the agent benchmarks by default (they dominate wall-clock and
# aren't correctness tests). Run them with `-m benchmark` or via the
# repo-root run_benchmarks.sh wrapper.
addopts = "-n auto -m 'not benchmark'"
markers = [
    "benchmark: throughput benchmark, deselected by default (run with -m benchmark)",
    "slow: long-running (e.g. a full ISMCTS self-play game); CI, not pre-commit",
]

[tool.mypy]
strict = true
disallow_any_explicit = false
disallow_any_generics = false

# Empty: makes the workspace-wide CI opt-out (UV_NO_GROUP=cuda in ci.yml) a
# valid group name under `uv run --package <this>`. The real cuda group lives
# in the workspace root's pyproject.
[dependency-groups]
cuda = []
