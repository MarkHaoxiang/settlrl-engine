[project]
name = "settlrl-agents"
version = "0.1.0"
description = "Settlrl-playing agents (pure-JAX policies) for settlrl-engine"
readme = "README.md"
authors = [
    { name = "MarkHaoxiang", email = "mark.haoxiang@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "settlrl-engine",
    "jax[cpu]>=0.4.0",
    "jaxtyping>=0.3.10",
    "mctx>=0.0.6",
    "pydantic>=2.13.4",
    "omegaconf>=2.3.1",
]

[project.scripts]
settlrl-agents = "settlrl_agents.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
settlrl-engine = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
# Deselect the agent benchmarks by default (they dominate wall-clock and
# aren't correctness tests). Run them with `-m benchmark` or via the
# repo-root run_benchmarks.sh wrapper.
addopts = "-n auto -m 'not benchmark'"
markers = [
    "benchmark: throughput benchmark, deselected by default (run with -m benchmark)",
]

[tool.mypy]
strict = true
disallow_any_explicit = false
disallow_any_generics = false

# Empty: makes the workspace-wide CI opt-out (UV_NO_GROUP=cuda in ci.yml) a
# valid group name under `uv run --package <this>`. The real cuda group lives
# in the workspace root's pyproject.
[dependency-groups]
cuda = []
