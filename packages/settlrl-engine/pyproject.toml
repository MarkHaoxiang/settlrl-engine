[project]
name = "settlrl-engine"
version = "0.1.0"
description = "Settlrl game engine"
readme = "README.md"
authors = [
    { name = "MarkHaoxiang", email = "mark.haoxiang@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "jax[cpu]>=0.4.0",
    "jaxtyping>=0.3.10",
]

[project.optional-dependencies]
# The PettingZoo-AEC wrapper (settlrl_engine.aec) needs these; the core engine and
# the batched env (settlrl_engine.env) do not.
rl = [
    "gymnasium>=0.29",
    "pettingzoo>=1.24",
]
# NVIDIA GPU support: the CUDA 13 jaxlib plugin (bundles the CUDA runtime, so
# only the NVIDIA driver is needed on the host). Linux-only — jax publishes no
# CUDA wheels for other platforms. The engine itself is device-agnostic; without
# this extra everything runs on CPU.
cuda = [
    "jax[cuda13]>=0.7 ; sys_platform == 'linux'",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
# Deselect the throughput benchmarks by default (they dominate wall-clock and
# aren't correctness tests). Run them with `-m benchmark` or via the
# repo-root run_benchmarks.sh wrapper.
# Fixed worker count, not `-n auto`: the suite is critical-path-bound (JAX
# import + per-worker cold compiles) so it doesn't speed up past ~8 workers,
# while `auto` spawns one JAX process per core (32+) and quadruples peak memory.
addopts = "--cov=settlrl_engine --cov-report=term-missing -m 'not benchmark' -n 8"
markers = [
    "benchmark: throughput benchmark, deselected by default (run with -m benchmark)",
]

[tool.coverage.run]
source = ["settlrl_engine"]
branch = true

[tool.coverage.report]
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "\\.\\.\\.",
]

[tool.mypy]
strict = true
disallow_any_explicit = false
disallow_any_generics = false

# Empty: makes the workspace-wide CI opt-out (UV_NO_GROUP=cuda in ci.yml) a
# valid group name under `uv run --package <this>`. The real cuda group lives
# in the workspace root's pyproject.
[dependency-groups]
cuda = []
