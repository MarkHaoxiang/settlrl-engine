[project]
name = "catan-agents"
version = "0.1.0"
description = "Catan-playing agents (pure-JAX policies) for catan-engine"
readme = "README.md"
authors = [
    { name = "MarkHaoxiang", email = "mark.haoxiang@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "catan-engine",
    "jax[cpu]>=0.4.0",
    "jaxtyping>=0.3.10",
    "mctx>=0.0.6",
]

[project.scripts]
catan-agents = "catan_agents.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
catan-engine = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
# Deselect the agent benchmarks by default (they dominate wall-clock and
# aren't correctness tests). Run them with `-m benchmark` or via the
# repo-root run_benchmarks.sh wrapper.
addopts = "-n auto -m 'not benchmark'"
markers = [
    "benchmark: throughput benchmark, deselected by default (run with -m benchmark)",
]

[tool.mypy]
strict = true
disallow_any_explicit = false
disallow_any_generics = false
