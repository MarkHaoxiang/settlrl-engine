[project]
name = "settlrl-app"
version = "0.1.0"
description = "The Settlrl game server: REST + SSE API, async game runtime, storage, auth, and the SPA frontend."
authors = [
    { name = "MarkHaoxiang", email = "mark.haoxiang@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    # The shared game model: reference rules, serialization, session/replay.
    # The game server runs no engine/agents code — bot moves are delegated to a
    # remote bot service (settlrl-agents[service]) over HTTP.
    "settlrl-game",
    "fastapi[standard]>=0.115.0",
    # SSE framing + keepalive pings + client-disconnect handling for the game
    # event stream, so the endpoint doesn't hand-roll any of it.
    "sse-starlette>=2.1.0",
    # Accounts + the single async storage layer: fastapi-users on async
    # SQLAlchemy (it bundles password hashing, so we don't hand-roll it).
    "fastapi-users[sqlalchemy]>=13.0.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "aiosqlite>=0.20.0",
    # Multiplayer rating (the leaderboard): the patent-free Weng-Lin / Plackett-
    # Luce model. Rates a whole game from one rank vector, so we don't hand-roll
    # the math.
    "openskill>=5.1",
]

[project.scripts]
settlrl-app = "settlrl_app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
settlrl-game = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-n auto"

# Empty: makes the workspace-wide CI opt-out (UV_NO_GROUP=cuda in ci.yml) a
# valid group name under `uv run --package <this>`. The real cuda group lives
# in the workspace root's pyproject.
[dependency-groups]
cuda = []
