repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: stack-bound-doc
        name: stack-bound doc up to date
        entry: bash -c 'uv run python packages/catan-engine/tools/gen_stack_bound_doc.py && git diff --exit-code packages/catan-engine/docs/longest-road-stack-bound.html'
        language: system
        pass_filenames: false
        files: ^packages/catan-engine/(tools/gen_stack_bound_doc\.py|docs/longest-road-stack-bound\.html)$
      - id: mypy
        name: mypy
        entry: uv run mypy packages/catan-engine/src packages/catan-engine/tests packages/catan-agents/src packages/catan-agents/tests packages/catan-render/src packages/catan-reference/src packages/catan-learn/src packages/catan-learn/tests/test_learn.py
        language: system
        pass_filenames: false
        always_run: true
      - id: pytest
        name: pytest
        entry: uv run pytest packages/catan-engine/tests/
        language: system
        pass_filenames: false
        always_run: true
